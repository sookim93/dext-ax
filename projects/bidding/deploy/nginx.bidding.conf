# Place at /etc/nginx/sites-available/bidding then symlink to sites-enabled.
# After certbot --nginx, this file is auto-edited with SSL block.

server {
    listen 80;
    server_name bidding.mncapro.com;

    # certbot --nginx 실행 시 자동으로 443 SSL 블록 추가됨

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;
    }

    # Health check passthrough (optional)
    location = /sync/status {
        proxy_pass http://127.0.0.1:8000;
        access_log off;
    }
}
