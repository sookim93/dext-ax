name: 입찰공고 다이제스트

on:
  schedule:
    # KST 09:00 = UTC 00:00 (평일) — 최근 3일치 다이제스트 (무조건 발송)
    - cron: '0 0 * * 1-5'
    # KST 15:00 = UTC 06:00 (평일) — 오늘 신규만 (있을 때만 발송)
    - cron: '0 6 * * 1-5'
  workflow_dispatch:  # 수동 트리거

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'projects/bidding-mvp/requirements.txt'

      - name: Install dependencies
        run: pip install -r projects/bidding-mvp/requirements.txt

      - name: Determine window (7 days morning / 1 day afternoon)
        id: window
        run: |
          # UTC 00:00 = morning slot → DAYS_BACK=7 (캘린더 1주)
          # UTC 06:00 = afternoon slot → DAYS_BACK=1 (당일만, 신규 없으면 skip)
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "06" ]; then
            echo "DAYS_BACK=1" >> $GITHUB_OUTPUT
            echo "SLOT=afternoon" >> $GITHUB_OUTPUT
          else
            echo "DAYS_BACK=7" >> $GITHUB_OUTPUT
            echo "SLOT=morning" >> $GITHUB_OUTPUT
          fi

      - name: Run digest (${{ steps.window.outputs.SLOT }} — last ${{ steps.window.outputs.DAYS_BACK }}d)
        env:
          G2B_API_KEY: ${{ secrets.G2B_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_SENDER_NAME: 덱스트 입찰공고 봇
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
          DAYS_BACK: ${{ steps.window.outputs.DAYS_BACK }}
        run: python projects/bidding-mvp/daily_digest.py
